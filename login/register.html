<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angkringan 37 - Daftar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg"></div>

    <div class="wave-container">
        <div class="wave wave-1"></div>
        <div class="wave wave-2"></div>
        <div class="wave wave-3"></div>
    </div>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="login-container">
        <div class="login-card" id="card">

            <div class="login-header">
                <div class="gradient-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h2>Buat Akun</h2>
                <p>Daftar untuk melanjutkan</p>
            </div>

            <form id="registerForm" novalidate>

                <div class="form-group">
                    <div class="input-container">
                        <input type="text" id="username" name="username" required placeholder=" " autocomplete="username">
                        <label for="username">Nama Pengguna</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-container">
                        <input type="email" id="email" name="email" required placeholder=" " autocomplete="email">
                        <label for="email">Email</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-container password-container">
                        <input type="password" id="password" name="password" required placeholder=" " autocomplete="new-password">
                        <label for="password">Kata Sandi</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Tampilkan kata sandi">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="gradient-button" id="submitBtn">
                    <span class="btn-text">Daftar</span>
                    <div class="btn-loader">
                        <span></span><span></span><span></span>
                    </div>
                </button>

                <p id="message"></p>

            </form>

            <div class="signup-link">
                <p>Sudah punya akun? <a href="index.html">Masuk</a></p>
            </div>

        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
